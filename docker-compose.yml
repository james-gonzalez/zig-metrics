services:
  zig-metrics:
    build: .
    ports:
      - "9090:9090"
    restart: unless-stopped
    # Expose host-level /proc so the exporter sees the full system.
    # Remove these volumes to see only the container's own stats.
    volumes:
      - /proc:/proc:ro

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - zig-metrics
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
    restart: unless-stopped
