name: Zig Metrics CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: [self-hosted, k8s]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.16.0"

      - name: Run tests
        run: zig build test

      - name: Build (Linux amd64)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl

      - name: Build (Linux arm64)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl
