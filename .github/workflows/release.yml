name: Release and Publish

on:
  workflow_run:
    workflows: ["Zig Metrics CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release-and-publish:
    name: Release and Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Zig
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: mlugg/setup-zig@v1
        with:
          version: "0.16.0"

      - name: Build Linux amd64 binary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl
          cp zig-out/bin/zig-metrics zig-metrics-linux-amd64

      - name: Build Linux arm64 binary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl
          cp zig-out/bin/zig-metrics zig-metrics-linux-arm64

      - name: Upload binaries to release
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semantic.outputs.new_release_version }}
          files: |
            zig-metrics-linux-amd64
            zig-metrics-linux-arm64

      - name: Set up QEMU
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.semantic.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:cache,mode=max
